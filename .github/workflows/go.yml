# Build batchq for all supported targets on a single Linux runner.
# batchq is pure Go (modernc.org/sqlite) so no CGO, musl, or macOS host
# is required to cross-compile.

name: Build Binaries

permissions:
  contents: write

on:
  push:
    branches: [ "**" ]
    tags: ["*"]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4

      - name: Set branch suffix
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            safe_ref="${GITHUB_REF_NAME//\//-}"
            echo "BRANCH_SUFFIX=.${safe_ref}" >> "$GITHUB_ENV"
          else
            echo "BRANCH_SUFFIX=" >> "$GITHUB_ENV"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build linux_amd64
        run: GOOS=linux GOARCH=amd64 go build -o bin/batchq.linux_amd64${BRANCH_SUFFIX} main.go

      - name: Build linux_arm64
        run: GOOS=linux GOARCH=arm64 go build -o bin/batchq.linux_arm64${BRANCH_SUFFIX} main.go

      - name: Build macos_amd64
        run: GOOS=darwin GOARCH=amd64 go build -o bin/batchq.macos_amd64${BRANCH_SUFFIX} main.go

      - name: Build macos_arm64
        run: GOOS=darwin GOARCH=arm64 go build -o bin/batchq.macos_arm64${BRANCH_SUFFIX} main.go

      - name: Upload linux_amd64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.linux_amd64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.linux_amd64${{ env.BRANCH_SUFFIX }}

      - name: Upload linux_arm64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.linux_arm64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.linux_arm64${{ env.BRANCH_SUFFIX }}

      - name: Upload macos_amd64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.macos_amd64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.macos_amd64${{ env.BRANCH_SUFFIX }}

      - name: Upload macos_arm64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.macos_arm64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.macos_arm64${{ env.BRANCH_SUFFIX }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download linux_amd64
        uses: actions/download-artifact@v4
        with:
          name: batchq.linux_amd64
          path: ./artifacts/
      - name: Download linux_arm64
        uses: actions/download-artifact@v4
        with:
          name: batchq.linux_arm64
          path: ./artifacts/
      - name: Download macos_amd64
        uses: actions/download-artifact@v4
        with:
          name: batchq.macos_amd64
          path: ./artifacts/
      - name: Download macos_arm64
        uses: actions/download-artifact@v4
        with:
          name: batchq.macos_arm64
          path: ./artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
