# Build batchq for all supported targets on a single Linux runner.
# batchq is pure Go (modernc.org/sqlite) so no CGO, musl, or macOS host
# is required to cross-compile.
#
# Tag pushes (v*) cut a GitHub release with all 4 binaries attached.

name: Build Binaries

permissions:
  contents: write

on:
  push:
    branches: [ "**" ]
    tags: ["v*"]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      CGO_ENABLED: '0'
    steps:
      # fetch-depth: 0 + fetch-tags is required so scripts/version.sh
      # can see the full tag history. With a shallow clone the version
      # would always resolve to the fallback.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set branch suffix
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            safe_ref="${GITHUB_REF_NAME//\//-}"
            echo "BRANCH_SUFFIX=.${safe_ref}" >> "$GITHUB_ENV"
          else
            echo "BRANCH_SUFFIX=" >> "$GITHUB_ENV"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # Build via `make` so VERSION ldflags (from scripts/version.sh)
      # are baked into every binary. Branch builds get a suffix
      # appended after Make finishes, since the Makefile targets don't
      # know about CI ref names.
      - name: Build all targets
        run: make all

      - name: Apply branch suffix to artifacts
        if: env.BRANCH_SUFFIX != ''
        run: |
          for f in bin/batchq.linux_amd64 bin/batchq.linux_arm64 bin/batchq.macos_amd64 bin/batchq.macos_arm64; do
            mv "$f" "${f}${BRANCH_SUFFIX}"
          done

      - name: Upload linux_amd64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.linux_amd64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.linux_amd64${{ env.BRANCH_SUFFIX }}

      - name: Upload linux_arm64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.linux_arm64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.linux_arm64${{ env.BRANCH_SUFFIX }}

      - name: Upload macos_amd64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.macos_amd64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.macos_amd64${{ env.BRANCH_SUFFIX }}

      - name: Upload macos_arm64
        uses: actions/upload-artifact@v4
        with:
          name: batchq.macos_arm64${{ env.BRANCH_SUFFIX }}
          path: bin/batchq.macos_arm64${{ env.BRANCH_SUFFIX }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download linux_amd64
        uses: actions/download-artifact@v4
        with:
          name: batchq.linux_amd64
          path: ./artifacts/
      - name: Download linux_arm64
        uses: actions/download-artifact@v4
        with:
          name: batchq.linux_arm64
          path: ./artifacts/
      - name: Download macos_amd64
        uses: actions/download-artifact@v4
        with:
          name: batchq.macos_amd64
          path: ./artifacts/
      - name: Download macos_arm64
        uses: actions/download-artifact@v4
        with:
          name: batchq.macos_arm64
          path: ./artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
